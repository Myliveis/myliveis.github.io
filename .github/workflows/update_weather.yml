name: Daily Weather Generator

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 تحميل المشروع
        uses: actions/checkout@v3

      - name: 🟢 تشغيل Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 تثبيت المكتبات
        run: npm install

      - name: ▶️ تشغيل السكربت
        run: node generate_weather.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
